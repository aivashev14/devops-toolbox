services:
  db:
    image: postgres:16-alpine
    container_name: devops-toolbox-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops_password
      POSTGRES_DB: devops_toolbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_toolbox"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: devops-toolbox-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://devops:devops_password@db:5432/devops_toolbox
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api
    container_name: devops-toolbox-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
